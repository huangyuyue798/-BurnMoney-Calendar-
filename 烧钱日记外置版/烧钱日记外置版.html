<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烧钱日记</title>
  <link rel="stylesheet" href="style.css">
  <script src="烧钱日记.js"></script>
</head>
<body>
<header>
  <h1>烧钱日记</h1>
  <p class="tagline">把每一笔消费变成每日思考</p>
</header>

<nav>
  <div class="nav-btn active" onclick="switchTab(0)">概览</div>
  <div class="nav-btn" onclick="switchTab(1)">添加消费</div>
  <div class="nav-btn" onclick="switchTab(2)">我的资产</div>
  <div class="nav-btn" onclick="switchTab(3)">目标规划</div>
  <div class="nav-btn" onclick="switchTab(4)">设置</div>
</nav>

<!-- 概览 -->
<section id="tab-0">
  <h2>今日总日均花费</h2>
  <div class="result" id="total-daily">¥ 0.00</div>

  <div class="card-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:30px;">
    <div class="card">
      <strong>当前存款</strong><br>
      <span id="balance-display" style="font-size:2.2rem;">¥ 0</span>
    </div>
    <div class="card">
      <strong>月薪</strong><br>
      <span id="salary-display" style="font-size:2.2rem;">¥ 0</span><br>
      <small>日均收入 ¥ <span id="daily-income">0</span></small>
    </div>
  </div>
</section>

<!-- 添加消费 -->
<section id="tab-1" style="display:none">
  <h2>记录新消费</h2>
  <div class="card">
    <label>物品名称</label>
    <input type="text" id="name" placeholder="例如：Intel A380显卡">

    <label>价格 (元)</label>
    <input type="number" id="price" placeholder="例如：580">

    <label>分类</label>
    <select id="kind">
      <option value="普通">普通消费</option>
      <option value="手机">手机 / 平板</option>
      <option value="笔记本">笔记本 / 电脑</option>
    </select>

    <label>模式</label>
    <select id="mode">
      <option value="1">模式一：免息分期（90/180天）</option>
      <option value="2">模式二：买断月光（30天循环）</option>
    </select>

    <label>上传照片（可选）</label>
    <input type="file" id="photo" accept="image/*" onchange="previewPhoto()">

    <div id="preview" style="margin:15px 0;"></div>

    <button onclick="addItem()">添加物品</button>
  </div>
</section>

<!-- 我的资产 -->
<section id="tab-2" style="display:none">
  <h2>资产<br>
    <span>资产价值：</span><span id="all_money"></span>
  </h2>
  <div id="items-list"></div>
</section>

<!-- 目标规划 -->
<section id="tab-3" style="display:none">
  <h2>目标规划</h2>
  <div class="card">
    <label>目标名称</label>
    <input type="text" id="goal-name" placeholder="买车 / 买房">

    <label>目标金额</label>
    <input type="number" id="goal-amount" placeholder="300000">

    <button onclick="addGoal()">添加目标</button>
  </div>
  <div id="goal-result" class="result" style="display:none"></div>
</section>

<!-- 设置 -->
<section id="tab-4" style="display:none">
  <h2>基础设置</h2>
  <div class="settings">
    <div class="card">
      <label>月薪（元）</label>
      <input type="number" id="set-salary" value="12000">
      <button onclick="updateSalary()">保存月薪</button>
    </div>
    <div class="card">
      <label>当前存款（元）</label>
      <label for="set-balance"></label><input type="number" id="set-balance" value="45000">
      <button onclick="updateBalance()">保存存款</button>
    </div>
  </div>
</section>

<footer style="text-align:center;margin-top:80px;color:#666;">
  烧钱日记 v2 • Python公式移植
</footer>
</body>
</html>
